services:
  nllb-translator:
    build:
      context: ./nllb
    container_name: nllb-translator
    ports:
      - "8100:8000"
    volumes:
      # persists downloaded model weights — won't re-download on restart
      - nllb-model-cache:/model-cache
    environment:
      MODEL_ID: facebook/nllb-200-1.3B
      DEVICE: cpu        # change to "cuda" + add deploy.resources below for GPU
      MAX_LENGTH: "512"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # model load takes ~60-90s on first run

volumes:
  nllb-model-cache:
